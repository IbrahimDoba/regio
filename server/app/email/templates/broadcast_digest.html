{% extends "base.html" %}
{% block extra_styles %}
<style>
  .broadcast-card { border: 1px solid #eeeeee; border-radius: 8px; padding: 25px; margin: 20px 0; background-color: #fdfdfd; }
  .cta-btn { display: inline-block; padding: 12px 24px; background-color: #1a1a1a; color: #ffffff !important; text-decoration: none; border-radius: 4px; font-weight: bold; margin-top: 15px; font-size: 17px; }
</style>
{% endblock %}
{% block content %}
<div class="body">
  <p>{{ (t.intro1 | safe).format(name=user_first_name) }}</p>
  <p>{{ t.intro2 | safe }}</p>

  <div class="broadcast-card">
    <h2>{{ broadcast_title }}</h2>
    <p style="white-space: pre-wrap; margin-bottom: 0;">{{ broadcast_body }}</p>

    {% if broadcast_link %}
    <a class="cta-btn" href="{{ broadcast_link }}">{{ t.cta | safe }}</a>
    {% endif %}
  </div>
</div>
{% endblock %}
