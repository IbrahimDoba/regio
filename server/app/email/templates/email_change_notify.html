{% extends "base.html" %}
{% block extra_styles %}
<style>
  .notice { background-color: #f9f9f9; padding: 16px 20px; border-radius: 8px; font-size: 15px; color: #555555; margin: 20px 0; }
  .new-email { font-weight: 600; color: #3D633D; }
</style>
{% endblock %}
{% block content %}
<div class="body">
  <h2>{{ (t.heading | safe).format(name=user_first_name) }}</h2>
  <p>{{ t.intro | safe }}</p>
  <p class="new-email">{{ new_email }}</p>
  <p>{{ t.confirm_hint | safe }}</p>
  <div class="notice">{{ t.notice | safe }}</div>
</div>
{% endblock %}
