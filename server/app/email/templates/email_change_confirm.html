{% extends "base.html" %}
{% block extra_styles %}
<style>
  .cta { display: inline-block; padding: 16px 32px; background-color: #3D633D; color: #ffffff !important; text-decoration: none; border-radius: 6px; font-weight: 600; margin: 20px 0; font-size: 18px; }
  .notice { background-color: #f9f9f9; padding: 16px 20px; border-radius: 8px; font-size: 15px; color: #555555; margin: 20px 0; }
</style>
{% endblock %}
{% block content %}
<div class="body">
  <h2>{{ (t.heading | safe).format(name=user_first_name) }}</h2>
  <p>{{ t.intro | safe }}</p>

  <div style="text-align: center;">
    <a class="cta" href="{{ confirm_url }}">{{ t.cta | safe }}</a>
  </div>

  <div class="notice">{{ t.notice | safe }}</div>
</div>
{% endblock %}
